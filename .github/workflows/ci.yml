name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: rm -f package-lock.json && npm install --ignore-scripts
      - run: npm run check:release
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - name: Verify plugin bundle version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          META_VERSION=$(node -p "require('./plugin/widget-meta.json').packageVersion")
          if [ "$PKG_VERSION" != "$META_VERSION" ]; then
            echo "ERROR: widget-meta.json ($META_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Plugin version $META_VERSION matches package.json"
