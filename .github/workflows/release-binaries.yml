name: Build release binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-13
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: rm -f package-lock.json && npm install --ignore-scripts

      - name: Typecheck and build tsc output
        run: |
          npm run typecheck
          npm run build

      - name: Build binary
        run: node scripts/build-binary.mjs --target=${{ matrix.target }}

      - name: Smoke test
        shell: bash
        run: |
          cd dist-bin/memi-${{ matrix.target }}
          if [ -f ./memi.exe ]; then
            ./memi.exe --version
          else
            ./memi --version
          fi

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-bin/memi-${{ matrix.target }}.tar.gz
            dist-bin/memi-${{ matrix.target }}.zip
            dist-bin/memi-${{ matrix.target }}.tar.gz.sha256
            dist-bin/memi-${{ matrix.target }}.zip.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all release assets
        run: |
          mkdir -p sums
          gh release download "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" \
            --pattern '*.sha256' --dir sums
          cat sums/*.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload combined SHA256SUMS.txt
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.binary
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/sarveshsea/memoire:latest
            ghcr.io/sarveshsea/memoire:${{ github.ref_name }}

  publish-homebrew:
    needs: publish-checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download SHA256SUMS
        run: |
          mkdir -p dist-bin
          gh release download "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" \
            --pattern 'SHA256SUMS.txt' --dir dist-bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Render Homebrew formula
        run: node scripts/homebrew/update-formula.mjs --out memoire.rb
      - name: Push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not configured — skipping tap push"
            exit 0
          fi
          git clone "https://x-access-token:${GH_TOKEN}@github.com/sarveshsea/homebrew-memoire.git" tap
          mkdir -p tap/Formula
          cp memoire.rb tap/Formula/memoire.rb
          cd tap
          git config user.name "sarveshsea-bot"
          git config user.email "bot@memoire.cv"
          git add Formula/memoire.rb
          git commit -m "memoire ${GITHUB_REF_NAME}" || echo "no changes"
          git push
